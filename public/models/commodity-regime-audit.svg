<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-label="Commodity-regime data audit and final model sample">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.22"/></filter>
<linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#65e3a2" stop-opacity="0.42"/><stop offset="1" stop-color="#65e3a2" stop-opacity="0.04"/></linearGradient>
<linearGradient id="blueFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8fb7de" stop-opacity="0.42"/><stop offset="1" stop-color="#8fb7de" stop-opacity="0.04"/></linearGradient>
</defs>
<rect width="100%" height="100%" rx="24" fill="#07111b"/>
<rect x="1" y="1" width="1198" height="698" rx="23" fill="none" stroke="#274052"/>
<style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.label{fill:#9db0bd;font-size:18px}.small{fill:#9db0bd;font-size:15px}.value{fill:#eef8f3;font-size:20px;font-weight:650}.axis{stroke:#274052;stroke-width:1}.headline{fill:#eef8f3;font-size:22px;font-weight:650}.note{fill:#9db0bd;font-size:16px}</style>
<rect x="60" y="90" width="320" height="230" rx="18" fill="#0b1723" stroke="#274052" filter="url(#shadow)"/>
<text class="small" x="88" y="135" letter-spacing="1.5">PREPARED SAMPLE</text>
<text class="headline" x="88" y="195">104 monthly rows</text>
<text class="note" x="88" y="235">2017-04 to 2025-12</text>
<rect x="430" y="90" width="320" height="230" rx="18" fill="#0b1723" stroke="#274052" filter="url(#shadow)"/>
<text class="small" x="458" y="135" letter-spacing="1.5">EXCLUDED ARTEFACTS</text>
<text class="headline" x="458" y="195">14 zero-return rows</text>
<text class="note" x="458" y="235">Forward-filled futures prices</text>
<rect x="800" y="90" width="320" height="230" rx="18" fill="#0b1723" stroke="#274052" filter="url(#shadow)"/>
<text class="small" x="828" y="135" letter-spacing="1.5">FINAL MODEL SAMPLE</text>
<text class="headline" x="828" y="195">89 observations</text>
<text class="note" x="828" y="235">2017-05 to 2025-12</text>
<line x1="380" y1="205" x2="416" y2="205" stroke="#8fb7de" stroke-width="3"/>
<path d="M 410 197 L 422 205 L 410 213" fill="none" stroke="#8fb7de" stroke-width="3"/>
<line x1="750" y1="205" x2="786" y2="205" stroke="#8fb7de" stroke-width="3"/>
<path d="M 780 197 L 792 205 L 780 213" fill="none" stroke="#8fb7de" stroke-width="3"/>
</svg>
