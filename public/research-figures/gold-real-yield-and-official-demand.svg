<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Gold real-yield invalidation and official-sector demand">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.22"/></filter>
<linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#65e3a2" stop-opacity="0.42"/><stop offset="1" stop-color="#65e3a2" stop-opacity="0.04"/></linearGradient>
<linearGradient id="blueFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8fb7de" stop-opacity="0.42"/><stop offset="1" stop-color="#8fb7de" stop-opacity="0.04"/></linearGradient>
</defs>
<rect width="100%" height="100%" rx="24" fill="#07111b"/>
<rect x="1" y="1" width="1198" height="698" rx="23" fill="none" stroke="#274052"/>
<style>text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.label{fill:#9db0bd;font-size:18px}.small{fill:#9db0bd;font-size:15px}.value{fill:#eef8f3;font-size:20px;font-weight:650}.axis{stroke:#274052;stroke-width:1}.headline{fill:#eef8f3;font-size:22px;font-weight:650}.note{fill:#9db0bd;font-size:16px}</style>
<text class="headline" x="70" y="54">Real-yield invalidation</text>
<text class="small" x="70" y="78">US 10-year TIPS yield, selected observations</text>
<line class="axis" x1="90" y1="555.0" x2="590" y2="555.0" opacity="0.55"/>
<text class="small" x="76" y="560.0" text-anchor="end">1.6%</text>
<line class="axis" x1="90" y1="459.4" x2="590" y2="459.4" opacity="0.55"/>
<text class="small" x="76" y="464.4" text-anchor="end">1.8%</text>
<line class="axis" x1="90" y1="363.9" x2="590" y2="363.9" opacity="0.55"/>
<text class="small" x="76" y="368.9" text-anchor="end">2.0%</text>
<line class="axis" x1="90" y1="268.3" x2="590" y2="268.3" opacity="0.55"/>
<text class="small" x="76" y="273.3" text-anchor="end">2.2%</text>
<line class="axis" x1="90" y1="172.8" x2="590" y2="172.8" opacity="0.55"/>
<text class="small" x="76" y="177.8" text-anchor="end">2.4%</text>
<line x1="90" y1="292.2" x2="590" y2="292.2" stroke="#f29a9a" stroke-width="3" stroke-dasharray="10 9"/>
<text class="small" x="585" y="280.2" text-anchor="end" fill="#f29a9a">2.15% invalidation</text>
<path d="M 90.0 416.4 L 340.0 416.4 L 590.0 196.7" fill="none" stroke="#f4c978" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="90.0" cy="416.4" r="8" fill="#07111b" stroke="#f4c978" stroke-width="4"/>
<text class="value" x="90.0" y="398.4" text-anchor="middle">1.89%</text>
<text class="label" x="90.0" y="593" text-anchor="middle">29 Jan</text>
<circle cx="340.0" cy="416.4" r="8" fill="#07111b" stroke="#f4c978" stroke-width="4"/>
<text class="value" x="340.0" y="398.4" text-anchor="middle">1.89%</text>
<text class="label" x="340.0" y="593" text-anchor="middle">5 Feb</text>
<circle cx="590.0" cy="196.7" r="8" fill="#07111b" stroke="#f4c978" stroke-width="4"/>
<text class="value" x="590.0" y="178.7" text-anchor="middle">2.35%</text>
<text class="label" x="590.0" y="593" text-anchor="middle">16 Jul</text>
<line x1="625" y1="90" x2="625" y2="620" stroke="#274052"/>
<text class="headline" x="680" y="54">Official demand remained strong</text>
<text class="small" x="680" y="78">Net central-bank purchases, tonnes</text>
<rect x="720" y="239.1" width="150" height="300.9" rx="9" fill="#65e3a2"/>
<text class="value" x="795.0" y="221.1" text-anchor="middle">216t</text>
<text class="label" x="795.0" y="578" text-anchor="middle">2025 qtr avg</text>
<rect x="940" y="200.1" width="150" height="339.9" rx="9" fill="#8fb7de"/>
<text class="value" x="1015.0" y="182.1" text-anchor="middle">244t</text>
<text class="label" x="1015.0" y="578" text-anchor="middle">Q1 2026</text>
<text class="note" x="690" y="615">Strong structural buying persisted, but it did not</text>
<text class="note" x="690" y="643">prevent the tactical thesis from failing.</text>
</svg>
